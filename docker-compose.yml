services:
  mongo:
    image: mongo:7
    container_name: arcmind-mongo
    restart: unless-stopped
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb
    healthcheck:
      test: >
        mongosh --quiet --eval "
          try { rs.status().ok }
          catch (e) {
            rs.initiate({_id:'rs0',members:[{_id:0,host:'localhost:27017'}]}).ok
          }
        "
      interval: 5s
      timeout: 30s
      start_period: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: arcmind-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  srh:
    image: hiett/serverless-redis-http:latest
    container_name: arcmind-srh
    restart: unless-stopped
    ports:
      - "8079:80"
    environment:
      SRH_MODE: env
      SRH_TOKEN: dev-token
      SRH_CONNECTION_STRING: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  web:
    build: .
    container_name: arcmind-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file: .env
    environment:
      DATABASE_URL: mongodb://mongo:27017/arcmind?replicaSet=rs0&directConnection=true
      UPSTASH_REDIS_REST_URL: http://srh:80
      UPSTASH_REDIS_REST_TOKEN: dev-token
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_BASE_URL: http://localhost:3000
    depends_on:
      mongo:
        condition: service_healthy
      srh:
        condition: service_started

volumes:
  mongo-data:
  mongo-config:
  redis-data:
